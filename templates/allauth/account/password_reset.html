{% extends "base.html" %}
{% block title %}Reset Password — DocShift{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-5 py-12">
  <div class="g-card rounded-2xl p-8">
    <div class="text-center mb-6">
      <div class="text-3xl mb-2">🔑</div>
      <h1 class="logo-text text-xl text-gray-800 dark:text-[#e2f0ff]">Reset password</h1>
      <p class="text-sm g-sub-text mt-1">Enter your email to receive a reset link</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-5">
        <input type="email" name="email" class="g-input" placeholder="you@example.com">
      </div>
      <button type="submit" class="g-btn w-full py-2.5 rounded-lg">Send reset link</button>
    </form>
    <p class="text-center text-sm g-sub-text mt-4">
      <a href="{% url 'account_login' %}" class="text-blue-600 dark:text-[#38b6ff] hover:underline">← Back to sign in</a>
    </p>
  </div>
</div>
{% endblock %}
